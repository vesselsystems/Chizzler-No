<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">ThoughtRecorder preview</title>
  <desc id="desc">A macOS desktop preview showing the ThoughtRecorder menu and capture overlay.</desc>
  <defs>
    <linearGradient id="wallpaper" x1="0" y1="0" x2="1280" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f4f7f5"/>
      <stop offset=".55" stop-color="#dfe8e3"/>
      <stop offset="1" stop-color="#b8d8d0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#10201d" flood-opacity=".22"/>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="url(#wallpaper)"/>
  <rect y="0" width="1280" height="32" fill="#f8faf8" opacity=".92"/>
  <text x="24" y="21" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" font-weight="600" fill="#17201e">ThoughtRecorder</text>
  <text x="1110" y="21" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" fill="#17201e">Rec</text>
  <g filter="url(#shadow)">
    <rect x="833" y="42" width="352" height="360" rx="14" fill="#fbfcfb"/>
    <rect x="833" y="42" width="352" height="360" rx="14" fill="none" stroke="#d9e2de"/>
    <text x="865" y="86" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16" font-weight="600" fill="#17201e">Hold to Talk: Control + Option + Command + Space</text>
    <text x="865" y="122" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" fill="#586763">Paste: Command-V after capture, or menu action</text>
    <line x1="857" y1="148" x2="1161" y2="148" stroke="#e1e8e5"/>
    <text x="865" y="184" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16" fill="#17201e">Paste Latest Transcript</text>
    <text x="865" y="222" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16" fill="#17201e">Show Latest Transcript</text>
    <text x="865" y="260" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16" fill="#17201e">Copy Latest Transcript</text>
    <text x="865" y="298" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16" fill="#17201e">Open at Login</text>
    <text x="865" y="336" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16" fill="#17201e">Show Instructions</text>
    <line x1="857" y1="356" x2="1161" y2="356" stroke="#e1e8e5"/>
    <text x="865" y="384" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16" fill="#17201e">Quit</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="477" y="110" width="326" height="76" rx="28" fill="#121a1d" opacity=".92"/>
    <circle cx="528" cy="148" r="15" fill="#39e6ca"/>
    <text x="560" y="156" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" font-weight="700" fill="#f5fbf8">Listening...</text>
  </g>
  <g transform="translate(120 198)">
    <rect width="496" height="306" rx="18" fill="#fbfcfb" stroke="#d9e2de"/>
    <text x="34" y="56" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="700" fill="#17201e">Capture a thought without switching context.</text>
    <text x="34" y="98" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="17" fill="#586763">Hold the shortcut, speak, release, then paste normally anywhere.</text>
    <rect x="34" y="142" width="428" height="54" rx="12" fill="#eef6f3"/>
    <text x="58" y="176" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16" font-weight="600" fill="#17201e">Control + Option + Command + Space</text>
    <rect x="34" y="218" width="176" height="48" rx="12" fill="#173036"/>
    <text x="64" y="249" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16" font-weight="700" fill="#f5fbf8">Copied</text>
  </g>
</svg>
