name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

jobs:
  macos:
    name: macOS DMG
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Show tool versions
        run: |
          swift --version
          xcodebuild -version

      - name: Build DMG
        run: |
          chmod +x build.sh scripts/package_dmg.sh scripts/checksum.sh scripts/generate_icon.swift
          VERSION="1.0.0"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          MARKETING_VERSION="$VERSION" ./scripts/package_dmg.sh
          MARKETING_VERSION="$VERSION" ./scripts/checksum.sh

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: ThoughtRecorder-macOS
          path: |
            dist/*.dmg
            dist/*.sha256

  windows:
    name: Windows MSI and EXE
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Show tool versions
        shell: pwsh
        run: |
          dotnet --info

      - name: Build Windows artifacts
        shell: pwsh
        run: |
          $version = "1.0.0"
          if ($env:GITHUB_REF -like "refs/tags/v*") {
            $version = $env:GITHUB_REF_NAME.Substring(1)
          }
          ./scripts/package_windows.ps1 -Version $version -Runtime win-x64

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: ThoughtRecorder-Windows
          path: |
            dist/*.zip
            dist/*.msi
            dist/*.sha256

  publish-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs:
      - macos
      - windows

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: |
          find release-assets -maxdepth 1 -type f -print | sort

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" release-assets/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" release-assets/* \
              --title "ThoughtRecorder ${GITHUB_REF_NAME#v}" \
              --notes "Automated community builds from ${GITHUB_SHA}."
          fi
