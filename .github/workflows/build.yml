name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

jobs:
  package:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show tool versions
        run: |
          swift --version
          xcodebuild -version

      - name: Build DMG
        run: |
          chmod +x build.sh scripts/package_dmg.sh scripts/checksum.sh scripts/generate_icon.swift
          ./scripts/package_dmg.sh
          ./scripts/checksum.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ThoughtRecorder-macOS
          path: |
            dist/*.dmg
            dist/*.sha256

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/*.dmg dist/*.sha256 --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/*.dmg dist/*.sha256 \
              --title "ThoughtRecorder ${GITHUB_REF_NAME#v}" \
              --notes "Automated community build from ${GITHUB_SHA}."
          fi
